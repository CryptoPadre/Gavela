    <!-- Google Invisible reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <script>
      window.onload = function () {
        const form = document.getElementById("contact-form");
        const btn = document.getElementById("submit-btn");
        form.time.value = new Date().toISOString();
        form.addEventListener("submit", function (e) {
          e.preventDefault();
          grecaptcha.execute();
        });
      };
      function onSubmit(token) {
        const form = document.getElementById("contact-form");
        const btn = document.getElementById("submit-btn");
        if (form.website.value) {
          console.log("Spam észlelve");
          btn.disabled = false;
          return;
        }
        btn.disabled = true;
        btn.value = "Küldés...";
        const params = {
          name: form.name.value,
          email: form.email.value,
          title: form.title.value,
          message: form.message.value,
          time: form.time.value,
          "g-recaptcha-response": token,
        };
        emailjs
          .send("service_2duf0zp", "template_xirrabg", params)
          .then(() => {
            window.location.href = "confirmation.html";
          })
          .catch((err) => {
            console.log("Sikertelen...", err);
            btn.disabled = false;
            btn.value = "Küldés";
          });
      }
    </script>

    <main class="main text-center mt-5 pt-5">
      <form id="contact-form" class="contact-form d-inline-block w-75 rounded">
        <div class="row g-3 d-inline-flex flex-column w-50">
          <input type="hidden" name="time" />
          <label>Név</label>

          <label>E-mail</label>
          <input type="email" name="email" required />
          <label>Tárgy</label>
          <input type="text" name="title" required />
          <label>Üzenet</label>
          <textarea name="message" required class="form-message"></textarea>
          <input type="text" name="website" style="display: none" />
          <input
            type="submit"
            value="Küldés"
            id="submit-btn"
            class="btn bg-light contactbtn"
          />
          <div
            class="g-recaptcha"
            data-sitekey="6LeRoZEsAAAAALkIYuWM84Rtz53D_9L9_YmgWEpE"
            data-callback="onSubmit"
            data-size="invisible"
