<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Meta tags for search engines -->
    <meta
      name="description"
      content="Gavelon: A one-man business offering billing audit and dispute services, software and game development, and travel consultancy."
    />
    <meta
      name="keywords"
      content="video games, finance, billing audit, billing dispute, customer service, software development, game development, travel consultancy"
    />
    <!-- Favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/favicon_io/favicon-16x16.png"
    />
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- CSS -->
    <link href="../assets/css/style.css" rel="stylesheet" />
    <title>
      Gavela | Billing Audit, Software & Game Development, Travel Consultancy
    </title>
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="row">
        <div class="text-center">
          <a href="../index.html">
            <img
              src="../Images/logo.png"
              class="img-fluid"
              alt="company logo"
            />
          </a>
        </div>
      </div>
    </header>
    <main>
      <!--Flexbox for the content-->
      <div class="d-flex flex-column align-items-center flex-wrap">
        <!--Finance Services-->
        <div class="card w-50 mb-3 text-center finance">
          <div class="card-body">
            <h5
              class="card-title bg-light d-inline-block px-2 py-1"
            >
              Finance Services
            </h5>
            <br>
            <a href="finance.html" class="btn bg-light finbtn">Find out more</a>
          </div>
        </div>
        <!--Development-->
        <div class="card w-50 mb-3 text-center development developmenttext">
          <div class="card-body">
            <h5
              class="card-title d-inline-block bg-light px-2 py-1"
            >
              Software & Web Development
            </h5>
           <br>
            <a href="development.html" class="btn bg-light devbtn">Find out more</a>
          </div>
        </div>
        <!--About-->
        <div class="card w-50 mb-3 text-center about">
          <div class="card-body">
            <h5 class="card-title">About Gavela</h5>
            <a href="about.html" class="btn bg-light aboutbtn">Read more</a>
          </div>
        </div>
        <!--Contact form-->
        <div class="card w-50 mb- text-center contact">
          <div class="card-body">
            <h5 class="card-title contactcard">Contact us</h5>
            <a href="contact.html" class="btn bg-light contactbtn">Send request</a>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div class="text-center mt-4">
          <a href="https://github.com/CryptoPadre" target="_blank" rel="noopener" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>

       <a href="#" target="_blank" rel="noopener" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></
      </div>
    </footer>
    <!-- Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- Font Awesome -->
    <script
      src="https://kit.fontawesome.com/7b140d41c7.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
