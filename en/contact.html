    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
      emailjs.init("kmmjfK8vrCLMI5r0y");
    </script>

    <!-- Google Invisible reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <script>
      window.onload = function () {
        const form = document.getElementById("contact-form");
        const btn = document.getElementById("submit-btn");

        // Set timestamp
        form.time.value = new Date().toISOString();

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          grecaptcha.execute(); // triggers onSubmit(token)
        });
      };

      function onSubmit(token) {
        const form = document.getElementById("contact-form");
        const btn = document.getElementById("submit-btn");

        // Honeypot spam check
        if (form.website.value) {
          console.log("Spam detected");
          btn.disabled = false;
          return;
        }

        // Disable button while sending
        btn.disabled = true;
        btn.value = "Sending...";

        const params = {
          name: form.name.value,
          email: form.email.value,
          title: form.title.value,
          message: form.message.value,
          time: form.time.value,
          "g-recaptcha-response": token,
        };

        emailjs
          .send("service_2duf0zp", "template_xirrabg", params)
          .then(() => {
            window.location.href = "confirmation.html";
          })
          .catch((err) => {
            console.log("FAILED...", err);
            btn.disabled = false;
            btn.value = "Send";
          });
      }
    </script>

    <main class="main text-center mt-5 pt-5">
      <form id="contact-form" class="contact-form d-inline-block w-75 rounded">
        <div class="row g-3 d-inline-flex flex-column w-50">
          <input type="hidden" name="time" />

          <label>Name</label>
          <input type="text" name="name" required />

          <label>Email</label>
          <input type="email" name="email" required />

          <label>Subject</label>
          <input type="text" name="title" required />

          <label>Message</label>
          <textarea name="message" required class="form-message"></textarea>

          <!-- Honeypot -->
          <input type="text" name="website" style="display: none" />

          <input
            type="submit"
            value="Send"
            id="submit-btn"
            class="btn bg-light contactbtn"
          />
          <!-- Invisible reCAPTCHA -->
          <div
            class="g-recaptcha"
            data-sitekey="6LeRoZEsAAAAALkIYuWM84Rtz53D_9L9_YmgWEpE"
            data-callback="onSubmit"
            data-size="invisible"
          ></div>
        </div>
