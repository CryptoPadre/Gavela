<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Metatags -->
    <meta
      name="description"
      content="Get in touch with Gavela for inquiries, feedback, or support."
    />
    <meta name="keywords" content="Gavela, contact, support, inquiry, email" />
    <meta name="author" content="Gavela" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="Contact Gavela" />
    <meta
      property="og:description"
      content="Reach out to Gavela via our contact form."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gavela.eu/en/contact.html" />
    <meta
      property="og:image"
      content="https://gavela.eu/assets/images/logo.png"
    />

    <!-- Favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/favicon_io/favicon-16x16.png"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- CSS -->
    <link href="../assets/css/style.css" rel="stylesheet" />

    <title>Contact | Gavela</title>

    <!-- EmailJS -->
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>

    <script type="text/javascript">
      (function () {
        emailjs.init({
          publicKey: "kmmjfK8vrCLMI5r0y",
        });
      })();
    </script>
    <script type="text/javascript">
      window.onload = function () {
        document
          .getElementById("contact-form")
          .addEventListener("submit", function (event) {
            event.preventDefault();
            if (form.website.value) {
              console.log("Spam detected");
              return;
            }
            // Disable button
            var submitBTN = document.getElementById("submit-btn");
            submitBTN.disabled = true;
            // these IDs from the previous steps
            emailjs.sendForm("service_2duf0zp", "template_xirrabg", this).then(
              () => {
                window.location.href = "confirmation.html";
              },
              (error) => {
                console.log("FAILED...", error);
              },
            );
          });
      };
      window.onload = function () {
        const now = new Date();
        document.querySelector('input[name="time"]').value = now.toISOString();
      };
    </script>
  </head>

  <body>
    <header>
      <nav class="navbar fixed-top navbar-expand-sm bg-body-tertiary">
        <div class="container-fluid">
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNavAltMarkup"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
              <a class="nav-link" href="index.html">Home</a>
              <a class="nav-link" href="finance.html">Finance</a>
              <a class="nav-link" href="development.html">Development</a>
              <a class="nav-link" href="about.html">About</a>
              <a class="nav-link active" href="contact.html">Contact</a>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="main text-center mt-5 pt-5">
      <form id="contact-form">
        <div class="row g-3 d-inline-flex flex-column">
          <input type="hidden" name="time" />

          <label>Name</label>
          <input type="text" name="name" required />

          <label>Email</label>
          <input type="email" name="email" required />

          <label>Subject</label>
          <input type="text" name="title" required />

          <label>Message</label>
          <textarea
            name="message"
            required
            style="min-height: 150px"
          ></textarea>

          <!-- Honeypot -->
          <input type="text" name="website" style="display: none" />

          <input type="submit" value="Send" id="submit-btn" />
        </div>
      </form>
    </main>

    <footer>
      <div class="text-center mt-4">
        <a href="https://github.com/CryptoPadre" target="_blank" rel="noopener">
          <i class="fa-brands fa-github"></i>
        </a>
        <a href="#">
          <i class="fa-brands fa-facebook"></i>
        </a>
      </div>
    </footer>

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/7b140d41c7.js"></script>
  </body>
</html>
