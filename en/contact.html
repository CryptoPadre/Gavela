<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="main.js"></script>
    <!-- Favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../assets/favicon_io/favicon-16x16.png"
    />
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <!-- CSS -->
    <link href="../assets/css/style.css" rel="stylesheet" />
    <title>Page Title</title>
  </head>
  <body>
    <header>
      <!--Navbar-->
      <nav class="navbar fixed-top navbar-expand-sm bg-body-tertiary">
        <div class="container-fluid">
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNavAltMarkup"
            aria-controls="navbarNavAltMarkup"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
              <a class="nav-link" aria-current="page" href="index.html">Home</a>
              <a class="nav-link" href="finance.html">Finance</a>
              <a class="nav-link" href="development.html">Development</a>
              <a class="nav-link" href="about.html">About</a>
              <a class="nav-link active" href="contact.html">Contact</a>
            </div>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <form
        action="https://formsubmit.co/tamasgavlider@gavela.eu"
        method="POST"
        class="needs-validation"
        id="contactform"
        novalidate
      >
        <div class="row g-3 align-items-center">
          <div class="col-auto">
            <label for="name" class="form-label">Name</label>
            <input
              type="text"
              class="form-control"
              id="name"
              name="name"
              required
            />
            <div class="invalid-feedback">Please enter your name</div>
          </div>
          <div class="col-auto">
            <label for="email" class="form-label">Email address</label>
            <input
              type="email"
              class="form-control mp-3"
              id="email"
              name="email"
              required
            />
            <div class="invalid-feedback">
              Please enter a valid email address
            </div>
          </div>
          <div class="col-auto">
            <label for="message" class="form-label">Message</label>
            <textarea
              class="form-control"
              id="message"
              name="message"
              rows="3"
              required
            ></textarea>
            <div class="invalid-feedback">Please enter your message</div>
          </div>
          <button type="submit" class="btn btn-primary col-auto" id="submitBtn">
            Submit
          </button>
        </div>
      </form>
    </main>
    <footer>
      <div class="text-center mt-4">
        <a
          href="https://github.com/CryptoPadre"
          target="_blank"
          rel="noopener"
          aria-label="GitHub"
          ><i class="fa-brands fa-github"></i
        ></a>

        <a href="#" target="_blank" rel="noopener" aria-label="Facebook"
          ><i class="fa-brands fa-facebook"></i>
        </a>
      </div>
    </footer>
    <!-- Font Awesome -->
    <script
      src="https://kit.fontawesome.com/7b140d41c7.js"
      crossorigin="anonymous"
    ></script>
    <!--Form control-->
    <script src="../assets/js/form.js"></script>
  </body>
</html>
