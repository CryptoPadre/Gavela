    <!-- Open Graph -->
    <meta property="og:title" content="Contact Gavela" />
    <meta
      property="og:description"
      content="Reach out to Gavela via our contact form."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gavela.eu/en/contact.html" />
    <meta
      property="og:image"
      content="https://gavela.eu/assets/images/logo.png"
    />

    <!-- Favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/favicon_io/apple-touch-icon.png"
    />
    <link

      type="image/png"
      sizes="32x32"

    />
    <link

      type="image/png"
      sizes="16x16"
      href="../assets/favicon_io/favicon-16x16.png"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- CSS -->
    <link href="../assets/css/style.css" rel="stylesheet" />

    <title>Contact | Gavela</title>

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
      emailjs.init("kmmjfK8vrCLMI5r0y");
    </script>

    <!-- Google Invisible reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <script>
      window.onload = function () {
        const form = document.getElementById("contact-form");
        const btn = document.getElementById("submit-btn");

        // Set timestamp
        form.time.value = new Date().toISOString();

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          grecaptcha.execute(); // triggers onSubmit(token)
        });
      };

      function onSubmit(token) {
        const form = document.getElementById("contact-form");
        const btn = document.getElementById("submit-btn");

        // Honeypot spam check
        if (form.website.value) {
          console.log("Spam detected");
          btn.disabled = false;
          return;
        }

        // Disable button while sending
        btn.disabled = true;
        btn.value = "Sending...";

        const params = {
          name: form.name.value,
          email: form.email.value,
          title: form.title.value,
          message: form.message.value,
          time: form.time.value,
          "g-recaptcha-response": token,
        };

        emailjs
          .send("service_2duf0zp", "template_xirrabg", params)
          .then(() => {
            window.location.href = "confirmation.html";
          })
          .catch((err) => {
            console.log("FAILED...", err);
            btn.disabled = false;
            btn.value = "Send";
          });
      }
    </script>
  </head>

  <body>
    <header>
      <nav class="navbar fixed-top navbar-expand-sm bg-body-tertiary">
        <div class="container-fluid">
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNavAltMarkup"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
              <a class="nav-link" href="index.html">Home</a>
              <a class="nav-link" href="finance.html">Finance</a>
              <a class="nav-link" href="development.html">Development</a>
              <a class="nav-link" href="about.html">About</a>
              <a class="nav-link active" href="contact.html">Contact</a>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="main text-center mt-5 pt-5">
      <form id="contact-form" class="contact-form d-inline-block w-75 rounded">
        <div class="row g-3 d-inline-flex flex-column w-50">
          <input type="hidden" name="time" />

          <label>Name</label>
          <input type="text" name="name" required />

          <label>Email</label>
          <input type="email" name="email" required />

          <label>Subject</label>
          <input type="text" name="title" required />

          <label>Message</label>
          <textarea
            name="message"
            required
            class="form-message"
          ></textarea>

          <!-- Honeypot -->
          <input type="text" name="website" style="display: none" />

          <input type="submit" value="Send" id="submit-btn" class="btn bg-light contactbtn"/>
          <!-- Invisible reCAPTCHA -->
          <div
            class="g-recaptcha"
            data-sitekey="6LeRoZEsAAAAALkIYuWM84Rtz53D_9L9_YmgWEpE"
            data-callback="onSubmit"
            data-size="invisible"
          ></div>
        </div>
      </form>
    </main>

     <footer>
      <div class="text-center mt-4">

        <a href="https://www.facebook.com/profile.php?id=61578716649051" target="_blank" rel="noopener" aria-label="Facebook"
          ><i class="fa-brands fa-facebook"></i>
        </a>
      </div>
    </footer>

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/7b140d41c7.js"></script>
  </body>
</html>
