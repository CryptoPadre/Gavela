  <head>
    <meta charset="utf-8" />

    <!-- Metatags -->
    <meta name="description" content="Kontaktujte Gavelu pre otázky, spätnú väzbu alebo podporu." />
    <meta name="keywords" content="Gavela, kontakt, podpora, otázka, e-mail" />
    <meta name="author" content="Gavela" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="Kontaktujte Gavelu" />
    <meta property="og:description" content="Spojte sa s Gavelou cez náš kontaktný formulár." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gavela.eu/sk/contact.html" />
    <meta property="og:image" content="https://gavela.eu/assets/images/logo.png" />

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon_io/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon_io/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon_io/favicon-16x16.png" />

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- CSS -->
    <link href="../assets/css/style.css" rel="stylesheet" />

    <title>Kontakt | Gavela</title>

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
      emailjs.init("kmmjfK8vrCLMI5r0y");
    </script>

    <!-- Google Invisible reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <script>
      window.onload = function () {
        const form = document.getElementById("contact-form");
        const btn = document.getElementById("submit-btn");
        form.time.value = new Date().toISOString();
        form.addEventListener("submit", function (e) {
          e.preventDefault();
          grecaptcha.execute();
        });
      };
      function onSubmit(token) {
        const form = document.getElementById("contact-form");
        const btn = document.getElementById("submit-btn");
        if (form.website.value) {
          console.log("Zistený spam");
          btn.disabled = false;
          return;
        }
        btn.disabled = true;
        btn.value = "Odosielam...";
        const params = {
          name: form.name.value,
          email: form.email.value,
          title: form.title.value,
          message: form.message.value,
          time: form.time.value,
          "g-recaptcha-response": token,
        };
        emailjs.send("service_2duf0zp", "template_xirrabg", params)
          .then(() => { window.location.href = "confirmation.html"; })
          .catch((err) => { console.log("Nepodarilo sa...", err); btn.disabled = false; btn.value = "Odoslať"; });
      }
    </script>
  </head>

  <body>
    <header>
      <nav class="navbar fixed-top navbar-expand-sm bg-body-tertiary ">
        <div class="container-fluid">
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav contact-nav">
             <a class="nav-link"  href="index.html"
                >Domov</a
              >
              <a class="nav-link" href="finance.html">Financie</a>
              <a class="nav-link" href="development.html">Vývoj</a>
              <a class="nav-link" href="travel.html">Cestovanie</a>
              <a class="nav-link" href="about.html">O nás</a>
              <a class="nav-link active" aria-current="page" href="contact.html">Kontakt</a>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="main text-center mt-5 pt-5">
      <form id="contact-form" class="contact-form d-inline-block w-75 rounded">
        <div class="row g-3 d-inline-flex flex-column w-50">
          <input type="hidden" name="time" />
          <label>Meno</label>
          <input type="text" name="name" required />
          <label>E-mail</label>
          <input type="email" name="email" required />
          <label>Predmet</label>
          <input type="text" name="title" required />
          <label>Správa</label>
          <textarea name="message" required class="form-message"></textarea>
          <input type="text" name="website" style="display: none" />
          <input type="submit" value="Odoslať" id="submit-btn" class="btn bg-light contactbtn"/>
          <div class="g-recaptcha" data-sitekey="6LeRoZEsAAAAALkIYuWM84Rtz53D_9L9_YmgWEpE" data-callback="onSubmit" data-size="invisible"></div>
        </div>
      </form>
    </main>

     <footer>
      <div class="text-center mt-4">
        <a
          href="https://github.com/CryptoPadre"
          target="_blank"
          rel="noopener"
          aria-label="GitHub"
          ><i class="fa-brands fa-github"></i
        ></a>
        <a
          href="https://www.linkedin.com/in/tamasgavlider/"

        ></a>
        <a href="https://www.facebook.com/profile.php?id=61578716649051" target="_blank" rel="noopener" aria-label="Facebook"
          ><i class="fa-brands fa-facebook"></i>
        </a>
      </div>
    </footer>

    <script src="https://kit.fontawesome.com/7b140d41c7.js"></script>
  </body>
</html>
